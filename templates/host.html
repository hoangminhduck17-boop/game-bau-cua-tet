<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LỤC LINH TÀI TRẬN - HOST</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/countup.js/2.8.0/countUp.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
 /* --- HIỆU ỨNG PHÓNG TO QR CODE --- */
#qr-wrapper {
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Hiệu ứng nảy nhẹ cực mượt */
    cursor: pointer; /* Đổi con trỏ chuột thành hình bàn tay để biết là bấm được */
}

#qr-wrapper.zoomed {
    top: 50% !important;
    right: auto !important;
    left: 50% !important;
    transform: translate(-50%, -50%) scale(3); /* Phóng to gấp 3 lần giữa màn hình */
    z-index: 9999 !important;
    box-shadow: 0 0 100px rgba(255,215,0,0.8) !important;
}

/* Phông nền đen mờ đè lên sảnh chờ lúc QR phóng to */
#qr-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.85);
    z-index: 9998;
    cursor: pointer;
}
#qr-overlay.show { display: block; }
    /* --- CSS CHO MƯA TIỀN --- */
    .money-rain {
        position: fixed;
        top: -150px;
        z-index: 9999; /* Đè lên cả màn hình kết quả đen mờ */
        pointer-events: none;
        animation: fallDown linear forwards;
        filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
    }

    @keyframes fallDown {
        0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
        100% { transform: translateY(120vh) rotate(720deg) scale(0.8); opacity: 0; }
    }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
    ::-webkit-scrollbar-thumb { background: #f4f4f3; border-radius: 5px; }

    body { 
        margin: 0; font-family: 'Nunito', sans-serif; overflow: hidden; height: 100vh; width: 100vw; color: white;
        background-color: #000 !important; /* Bắt buộc nền ngoài luôn đen cho máy chiếu */
        transition: background 1s ease; perspective: 1000px;
    }
    .hidden { display: none !important; }

    #galaxy-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 1; transition: opacity 1s ease; }
    body.tet-theme #galaxy-canvas { opacity: 0; pointer-events: none; }

    .tet-deco { position: absolute; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 1s ease; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
    body.tet-theme .tet-deco { opacity: 1; }
    .flower-l { top: -20px; left: -20px; font-size: 120px; animation: sway 3s infinite; }
    .flower-r { top: -20px; right: -20px; font-size: 120px; animation: sway 4s infinite reverse; }
    .lantern { top: 20px; left: 15%; font-size: 80px; animation: swing 3s infinite; }
    @keyframes sway { 50%{transform: rotate(5deg);} }
    @keyframes swing { 50%{transform: rotate(10deg);} }

    .main-container { display: flex; height: 100%; position: relative; z-index: 10; }
    .left-game { flex: 75; display: flex; flex-direction: column; border-right: 2px solid rgba(255,215,0,0.3); padding-bottom: 20px; }
    .right-rank { flex: 25; background: rgba(0,0,0,0.4); padding: 15px; overflow: hidden; border-left: 1px solid rgba(255,255,255,0.1); }

    .top-section { height: 15%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
    .phase-title { font-size: 50px; color: #FFD700; text-shadow: 2px 2px 0 #8b0000; margin: 0; text-transform: uppercase; font-weight: 900; }
    .progress-bar-bg { width: 80%; height: 24px; background: #333; border-radius: 12px; overflow: hidden; border: 2px solid gold; box-shadow: 0 0 15px gold; margin-top: 5px;}
    .progress-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #FFD700, #ff8c00); transition: width 0.1s linear; }

    .middle-section { height: 40%; position: relative; overflow: hidden; }

    #motivational-quote {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 80%; max-width: 900px;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(6px);
        border: 2px solid rgba(255,215,0,0.5);
        border-left: 6px solid #FFD700;
        border-radius: 16px;
        padding: 22px 36px;
        text-align: center;
        font-family: 'Patrick Hand', cursive; font-size: 42px; color: #ffffff;
        text-shadow: 1px 1px 0 #000;
        z-index: 50; display: none; pointer-events: none;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .scene { width: 220px; height: 220px; perspective: 600px; position: absolute; top: -200px; left: 50%; transform: translate(-50%, -50%) scale(0.5); opacity: 0; transition: transform 0.5s ease; z-index: 100; }
    .scene.show-result { transform: translate(-50%, -50%) scale(1.5); opacity: 1; transition: top 0.5s, left 0.5s, transform 0.5s; }
    .scene.flying { opacity: 1; transform: translate(-50%, -50%) scale(0.8); transition: top 0.1s linear, left 0.1s linear; }
    
    .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transform: translateZ(-110px); transition: transform 1s; }
    .cube__face { position: absolute; width: 220px; height: 220px; background: #ffffff; border: 4px solid #d32f2f; border-radius: 20px; display: flex; justify-content: center; align-items: center; backface-visibility: hidden; transform-style: preserve-3d; }
    .cube__face img { width: 170px; height: 170px; object-fit: contain; }
    .cube__face--front { transform: rotateY(0deg) translateZ(110.5px); }
    .cube__face--right { transform: rotateY(90deg) translateZ(110.5px); }
    .cube__face--back  { transform: rotateY(180deg) translateZ(110.5px); }
    .cube__face--left  { transform: rotateY(-90deg) translateZ(110.5px); }
    .cube__face--top   { transform: rotateX(90deg) translateZ(110.5px); }
    .cube__face--bottom{ transform: rotateX(-90deg) translateZ(110.5px); }
    
    .is-spinning { animation: spinDice 0.2s infinite linear; }
    @keyframes spinDice { 0% { transform: translateZ(-110px) rotateX(0deg) rotateY(0deg); } 100% { transform: translateZ(-110px) rotateX(360deg) rotateY(720deg); } }

    .bottom-section { height: 45%; display: flex; align-items: center; justify-content: center; }
    .bet-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 90%; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 20px; }
    .bet-slot { background: linear-gradient(135deg, #fffde7, #fff176); border: 3px solid #d32f2f; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #d32f2f; font-weight: 900; position: relative; height: 120px; transition: transform 0.1s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .bet-slot:active { transform: scale(0.95); }
    .bet-img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 5px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
    .total-bet { background: #d32f2f; color: #FFD700; padding: 2px 15px; border-radius: 10px; font-size: 22px; min-width: 80px; text-align: center; border: 2px solid #FFD700; }
    .flying-money { position: absolute; font-size: 24px; color: gold; font-weight: 900; text-shadow: 1px 1px 0 #000; animation: flyUp 1s forwards; z-index: 100; pointer-events: none; }
    @keyframes flyUp { to { transform: translateY(-100px) scale(1.5); opacity: 0; } }

    #lobby { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 99; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 30px; box-sizing: border-box; }
    #lobby h1 { margin: 0 0 10px 0; font-size: 70px; color: #FFD700; text-shadow: 0 0 20px #ff0000; }
    #lobby h2 { margin: 0 0 20px 0; font-size: 30px; }
    
    .btn-start { 
        font-size: 35px; padding: 10px 60px; background: linear-gradient(45deg, #FFD700, #ff8c00); 
        border: none; border-radius: 50px; color: #d32f2f; font-weight: 900; 
        cursor: pointer; box-shadow: 0 0 20px #FFD700; animation: pulse 1s infinite; 
        margin-bottom: 20px; 
    }
    
    .lobby-grid { 
        display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-content: flex-start; 
        width: 100%; /* Bắt buộc full 100% chiều ngang để thanh cuộn dính sát mép phải */
        flex: 1; /* Tự động kéo giãn chiếm toàn bộ phần diện tích trống bên dưới nút Start */
        overflow-y: scroll; /* Hiển thị thanh cuộn y như phần vinh danh */
        padding: 30px 60px; /* Đẩy lề vào một chút để các thẻ người chơi không đụng vách */
        box-sizing: border-box; /* Quan trọng: Giữ cho khung không bị phình to quá màn hình */
        border: none; /* Bỏ viền hộp vuông cũ đi */
        border-top: 2px dashed rgba(240, 239, 238, 0.2); /* Chỉ kẻ 1 đường line mờ ở trên cho đẹp */
        border-radius: 0;
    }
    
    .lobby-card { 
        background: white; color: #333; padding: 15px 40px; border-radius: 40px; 
        font-weight: 900; font-size: 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        display: flex; align-items: center; gap: 10px; height: fit-content; margin: 10px;
    }
    #rank-list {
        position: relative;
        width: 100%;
        height: 0px; /* Sẽ tự co giãn qua JS */
        transition: height 0.3s ease;
    }

    .rank-item { 
        background: rgba(255,255,255,0.9); 
        color: #333; 
        padding: 10px 15px; 
        border-radius: 8px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        font-size: 18px; 
        border: 1px solid #444; 
        
        /* Chuyển động Kahoot */
        position: absolute;
        width: 100%; 
        height: 50px; 
        box-sizing: border-box;
        left: 0;
        top: 0;
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* Tăng specificity bằng cách nối class (.rank-item.top-X) */
 .rank-item.top-1 { background: linear-gradient(90deg, #d32f2f, #b71c1c); color: #FFD700; border: 2px solid #FFD700; font-weight: 900; }
 .rank-item.top-2 { background: linear-gradient(90deg, #FFD700, #ff8c00); color: #d32f2f; border: 2px solid #fff; font-weight: 800; }
 .rank-item.top-3 { background: linear-gradient(90deg, #2e7d32, #1b5e20); color: #fff; border: 1px solid #fff; font-weight: 700; }
    
    @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

    @keyframes police-flash { 0% { background: rgba(255,0,0,0.5); } 50% { background: rgba(0,0,255,0.5); } 100% { background: rgba(255,0,0,0.5); } }
    @keyframes fake-flash { 0% { background: rgba(255,215,0,0.4); } 50% { background: rgba(0,255,0,0.4); } 100% { background: rgba(255,215,0,0.4); } }
    @keyframes shake-img { 0% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } 100% { transform: rotate(0deg); } }
    
    .raid-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000;
        display: none; flex-direction: column; justify-content: center; align-items: center;
        background: rgba(0,0,0,0.9);
    }
    .raid-real { animation: police-flash 0.3s infinite; }
    .raid-fake { animation: fake-flash 0.5s infinite; }

    #result-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1500; background: rgba(0,0,0,0.82);
        flex-direction: row; align-items: center; justify-content: center; gap: 40px;
    }
    #result-overlay.show { display: flex; }
    .result-cube-card {
        width: 260px; height: 260px; background: white; border-radius: 28px;
        border: 5px solid #d32f2f; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 60px rgba(255,50,50,0.6), 0 20px 50px rgba(0,0,0,0.5);
        animation: popIn 0.4s cubic-bezier(.17,.67,.38,1.5) both;
    }
    .result-cube-card:nth-child(2) { animation-delay: 0.1s; }
    .result-cube-card:nth-child(3) { animation-delay: 0.2s; }
    .result-cube-card img { width: 200px; height: 200px; object-fit: contain; }
    @keyframes popIn {
        0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    #game-wrapper {
        width: 1920px; 
        height: 1080px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
        overflow: hidden;
        background-color: transparent;
        transition: background 1s ease;
    }
    
    /* Khi body có class tet-theme, chỉ đổ nền đỏ cho khung game */
    body.tet-theme #game-wrapper { 
        background: radial-gradient(circle, #a93737 0%, #5d0000 100%); 
    }
    /* =============================================
       ĐẾM NGƯỢC 3s
    ============================================= */
    #countdown-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 5000; background: rgba(0,0,0,0.88);
        flex-direction: column; align-items: center; justify-content: center;
    }
    #countdown-overlay.show { display: flex; }
    #countdown-num {
        font-size: 280px; font-weight: 900; font-family: 'Nunito', sans-serif;
        color: #FFD700; text-shadow: 0 0 60px #ff8c00, 0 0 120px #FFD700;
        animation: countPop 0.8s cubic-bezier(.17,.67,.38,1.4);
        line-height: 1;
    }
    #countdown-label {
        font-size: 36px; color: white; letter-spacing: 6px; margin-top: 20px;
        text-transform: uppercase; opacity: 0.7;
    }
    @keyframes countPop {
        0%  { transform: scale(0.3); opacity: 0; }
        60% { transform: scale(1.15); opacity: 1; }
        100%{ transform: scale(1);   opacity: 1; }
    }

    /* =============================================
       BẢNG VINH DANH + PHÁO HOA XỊN (NỀN ĐEN)
    ============================================= */
    #podium-screen {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 3000; 
        /* Cố định ảnh nền không bị trượt theo khi cuộn */
        background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/static/bg-tet.png') center/cover no-repeat fixed;
        flex-direction: column; align-items: center; 
        /* ĐÃ SỬA: Cho phép cuộn dọc toàn màn hình */
        overflow-y: auto; 
        overflow-x: hidden;
    }
    #podium-screen.show { display: flex; }

    /* Nội dung bảng vinh danh nổi lên trên */
    .podium-content {
        position: relative; z-index: 1;
        display: flex; flex-direction: column; align-items: center;
        width: 100%; 
        /* ĐÃ SỬA: Đổi từ height: 100% sang min-height để nó có thể dài ra vô tận */
        min-height: 100%; 
        /* Thêm padding-bottom để nút Về Sảnh Chờ không bị dính sát đáy màn hình khi cuộn xuống cùng */
        padding-bottom: 50px; 
    }

    .podium-header {
        font-size: 56px; font-weight: 900; color: #FFD700; letter-spacing: 4px;
        text-shadow: 0 0 30px #ff8c00, 0 0 60px #FFD700;
        margin: 30px 0 20px 0; text-transform: uppercase; font-family: 'Nunito', sans-serif;
        animation: titleGlow 2s infinite;
        flex-shrink: 0;
    }
    @keyframes titleGlow {
        0%,100% { text-shadow: 0 0 30px #ff8c00, 0 0 60px #FFD700; }
        50% { text-shadow: 0 0 60px #FFD700, 0 0 100px #ff8c00, 0 0 140px #FFD700; }
    }

    .podium-top3 {
        display: flex; align-items: flex-end; justify-content: center;
        gap: 30px; width: 100%; max-width: 800px;
        padding: 0 40px; margin-bottom: 30px; flex-shrink: 0;
    }
    .podium-slot {
        display: flex; flex-direction: column; align-items: center; 
        flex: 1; max-width: 240px; 
        opacity: 0; /* Ẩn ban đầu để chờ animation */
    }
    .slot-rank-3 { animation: slamDown 0.6s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards; }
    /* Hạng 2 xuất hiện tiếp theo */
    .slot-rank-2 { animation: slamDown 0.6s cubic-bezier(0.25, 1, 0.5, 1) 1.5s forwards; }
    /* Hạng 1 xuất hiện cuối cùng, đập mạnh nhất */
    .slot-rank-1 { animation: slamDownHeavy 0.8s cubic-bezier(0.25, 1, 0.5, 1) 2.7s forwards; }
    @keyframes slamDown {
        0% { transform: translateY(-300px) scale(1.2); opacity: 0; }
        60% { transform: translateY(20px) scale(0.9); opacity: 1; }
        80% { transform: translateY(-10px) scale(1.05); opacity: 1; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Keyframe riêng cho Top 1 để tạo cảm giác nặng nề, hoành tráng hơn */
    @keyframes slamDownHeavy {
        0% { transform: translateY(-500px) scale(1.5); opacity: 0; filter: drop-shadow(0 0 50px #FFD700); }
        50% { transform: translateY(40px) scale(0.85); opacity: 1; filter: drop-shadow(0 0 0px #FFD700); }
        70% { transform: translateY(-20px) scale(1.1); opacity: 1; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes podiumRise { from{transform:translateY(120px);opacity:0;} to{transform:translateY(0);opacity:1;} }

    .podium-crown { font-size: 40px; animation: crownBounce 1.2s infinite; margin-bottom: 4px; }
    @keyframes crownBounce { 0%,100%{transform:translateY(0)rotate(-5deg);} 50%{transform:translateY(-8px)rotate(5deg);} }
    .podium-avatar { font-size: 48px; margin-bottom: 6px; }
    .podium-name { font-size: 20px; font-weight: 900; color: white; text-shadow: 1px 1px 0 #000; margin-bottom: 5px; max-width: 180px; word-break: break-word; text-align: center; }
    .podium-money { font-size: 18px; font-weight: 700; color: #FFD700; margin-bottom: 10px; }
    .podium-block {
        width: 100%; border-radius: 12px 12px 0 0; display: flex; align-items: center;
        justify-content: center; font-size: 36px; font-weight: 900;
    }
    .pb-1 { height: 260px; background: linear-gradient(180deg, #FFD700, #ff8c00); color: #5d0000; box-shadow: 0 -6px 30px rgba(255,215,0,0.6); }
    .pb-2 { height: 160px; background: linear-gradient(180deg, #C0C0C0, #888); color: #222; }
    .pb-3 { height: 120px; background: linear-gradient(180deg, #CD7F32, #8B4513); color: #fff; }

    .podium-divider {
        width: 70%; height: 1px; flex-shrink: 0;
        background: linear-gradient(90deg, transparent, rgba(255,215,0,0.5), transparent);
        margin-bottom: 16px;
    }

    .podium-rest-title {
        font-size: 16px; color: rgba(255,255,255,0.4); letter-spacing: 3px;
        text-transform: uppercase; margin-bottom: 12px; flex-shrink: 0;
        font-family: 'Nunito', sans-serif;
    }
    .podium-rest-scroll {
        width: 100%; 
        max-width: 700px; 
        /* Bỏ flex: 1; và overflow-y: auto; */
        padding: 0 30px 30px 30px;
        /* Đảm bảo nó không bị giới hạn chiều cao */
        height: auto; 
    }
    .podium-rest-item {
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 14px; padding: 12px 20px; margin-bottom: 10px;
        font-family: 'Nunito', sans-serif;
        animation: slideIn 0.35s ease both;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:none;} }
    .podium-rest-left { display: flex; align-items: center; gap: 16px; }
    .podium-rest-rank { font-size: 18px; font-weight: 900; color: rgba(255,255,255,0.35); min-width: 36px; }
    .podium-rest-avatar { font-size: 30px; }
    .podium-rest-name { font-size: 20px; font-weight: 900; color: white; }
    .podium-rest-money { font-size: 20px; font-weight: 900; color: #FFD700; }

    .podium-btn-reload {
        flex-shrink: 0; margin: 16px 0 24px 0;
        padding: 14px 50px; font-size: 22px; font-family: 'Nunito', sans-serif;
        font-weight: 900; border-radius: 50px; border: none; cursor: pointer;
        background: linear-gradient(45deg, #FFD700, #ff8c00); color: #5d0000;
        box-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    
    /* Màn hình GAME OVER (host) */
    #host-game-over {
        position: fixed; inset: 0; background: black; z-index: 9999;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
    }
    #host-game-over h1 {
        font-size: 120px; color: #ff1744; 
        text-shadow: 4px 4px 0 #fff, 0 0 50px red;
        font-weight: 900; margin: 0; animation: pulse 1s infinite;
    }
/* --- CSS MASCOT VINH DANH --- */
    .podium-mascot {
    position: fixed; /* Dùng fixed để neo vào cửa sổ trình duyệt */
    bottom: -150px; width: 350px; z-index: 10; opacity: 0; 
    transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease;

<script>

new QRCode(document.getElementById("qrcode"), {

    let timeOffset = 0;     
    let pingCount = 0;      
    let bestRTT = Infinity; 
    let ntpInterval;

    function doNtpSync() {
        pingCount = 0;
        bestRTT = Infinity;
        socket.emit("ping_server", Date.now());
    }

    socket.on("connect", () => {
        doNtpSync();
        
        if (ntpInterval) clearInterval(ntpInterval);
        // Máy chiếu cũng cần đo lại mạng mỗi 30 giây để giờ luôn khít với điện thoại
        ntpInterval = setInterval(doNtpSync, 30000); 
        
        socket.emit("host_join");
        console.log("📺 Đã kết nối lại thành công và vào phòng VIP!");
    });

    socket.on("pong_server", (data) => {
        const t3 = Date.now(); 
        const rtt = t3 - data.t1; 
        const latency = rtt / 2; 
        if (rtt < bestRTT) {
            bestRTT = rtt;
            timeOffset = data.server_time - (t3 / 1000) + (latency / 1000);
        }
        pingCount++;
        if (pingCount < 5) { // Nâng lên 5 lần đo
            setTimeout(() => socket.emit("ping_server", Date.now()), 300);
        } else {
            console.log(`🎯 [NTP Sync Host] Mạng mượt nhất: ${bestRTT}ms | Độ lệch so với Server: ${timeOffset.toFixed(3)}s`);
        }
    });
    let galaxyAnimationId; 
    let isGalaxyActive = true;
    const DURATION_MAP = {"QUIZ": 15, "BETTING": 8, "ROLLING": 4, "RESULT": 6};
    const DICE_FACES = ["Bầu", "Cua", "Tôm", "Cá", "Nai", "Gà"];
    const MAP_IMG = { 
        "Bầu": "/static/bau.png", "Cua": "/static/cua.png", "Tôm": "/static/tom.png", 
        "Cá": "/static/ca.png", "Nai": "/static/nai.png", "Gà": "/static/ga.png" 
    };
    const ROTATION_MAP = { 
        "Bầu": {x: 0, y: 0}, "Cua": {x: 0, y: -90}, "Tôm": {x: 0, y: -180}, 
        "Cá": {x: 0, y: 90}, "Nai": {x: -90, y: 0}, "Gà": {x: 90, y: 0} 
    };

    function resetBetSlots() {
        DICE_FACES.forEach(animal => {
            const el = document.getElementById(`total-${animal}`);
            if (el) el.innerText = "0";
        });
        document.querySelectorAll(".flying-money").forEach(el => el.remove());
    }
    function initCubes() {
        for(let i=1; i<=3; i++) {
            const cube = document.getElementById(`cube-${i}`);
            let html = '';
            const classes = ['front', 'right', 'back', 'left', 'top', 'bottom'];
            DICE_FACES.forEach((face, idx) => { 
                html += `<div class="cube__face cube__face--${classes[idx]}"><img src="${MAP_IMG[face]}" onerror="this.style.display='none'"></div>`; 
            });
            cube.innerHTML = html;
        }
    }
    initCubes();
// AUDIO
    const audioLobby = document.getElementById("music-lobby");
    const audioGame  = document.getElementById("music-game");
    const siren      = document.getElementById("sfx-siren");
    const winSound   = document.getElementById("sfx-win");
    
    audioGame.volume = 0.3; 
    audioLobby.volume = 0.5; 
    siren.volume = 1.0;
    winSound.volume = 1.0;

    let isGameActive = false; // Ổ khóa chặn nhạc đè lên nhau

function ensureAudioContext() {
    const isPodiumShow = document.getElementById("podium-screen").classList.contains("show");
    const isGameUIVisible = !document.getElementById("game-ui").classList.contains("hidden");

    // Nếu đang chiếu bảng vinh danh thì không can thiệp nhạc
    if (isPodiumShow) return; 

    if (isGameUIVisible) {
        // TRƯỜNG HỢP 1: Game đang chạy (Do F5 khôi phục lại màn hình)
        isGameActive = true;
        audioLobby.pause(); // Ép tắt nhạc sảnh chờ
        if (audioGame.paused) {
            audioGame.play().catch(e => console.log("Đã khôi phục nhạc game!"));
        }
    } else {
        // TRƯỜNG HỢP 2: Đang ở sảnh chờ LOBBY
        if (!isGameActive && audioLobby.paused) {
            audioLobby.play().catch(e => console.log("Đã bật nhạc sảnh chờ!"));
        }
    }
}
    
    function reqStart(){ 
        if(confirm("Vào sòng nha?")) {
            isGameActive = true; 
            
            // XÓA NGAY LẬP TỨC LỆNH ONCLICK CỦA BODY ĐỂ KHÔNG BAO GIỜ GỌI LẠI HÀM ÂM THANH NỮA
            document.body.removeAttribute("onclick");

            // Đánh lừa trình duyệt: Bật rồi tắt nhanh tất cả âm thanh để xin cấp quyền
            audioGame.play().then(() => { audioGame.pause(); audioGame.currentTime = 0; }).catch(e=>{});
            siren.play().then(() => { siren.pause(); siren.currentTime = 0; }).catch(e=>{});
            winSound.play().then(() => { winSound.pause(); winSound.currentTime = 0; }).catch(e=>{});
            const jackpotSound = document.getElementById("sfx-jackpot");
            if (jackpotSound) jackpotSound.play().then(() => { jackpotSound.pause(); jackpotSound.currentTime = 0; }).catch(e=>{});
            socket.emit("start_game"); 
        }
    }
    socket.on("control_music", data => {
        if (data.action === "stop_lobby") audioLobby.pause();
        if (data.action_next === "play_game_bg") audioGame.play().catch(e=>{});
    });

    // =============================================
    // ĐẾM NGƯỢC
    // =============================================
    socket.on("countdown_start", data => {
        const overlay = document.getElementById("countdown-overlay");
        const numEl   = document.getElementById("countdown-num");
        const lblEl   = document.getElementById("countdown-label");

        if (data.count === 0) {
            // Ẩn overlay, vào game
            overlay.classList.remove("show");
            document.getElementById("lobby").classList.add("hidden");
            document.getElementById("game-ui").classList.remove("hidden");
            document.body.classList.add("tet-theme");
            stopGalaxy();
            return;
        }

        // Hiện overlay + số đếm
        overlay.classList.add("show");
        numEl.style.animation = "none";
        void numEl.offsetWidth;   // trigger reflow để restart animation
        numEl.style.animation = "countPop 0.8s cubic-bezier(.17,.67,.38,1.4)";

        if (data.count === 3) { numEl.innerText = "3"; numEl.style.color = "#ff4444"; }
        else if (data.count === 2) { numEl.innerText = "2"; numEl.style.color = "#FFD700"; }
        else if (data.count === 1) { numEl.innerText = "1"; numEl.style.color = "#76ff03"; numEl.style.textShadow = "0 0 60px #00ff00, 0 0 120px #76ff03"; }

        lblEl.innerText = data.count === 1 ? "VÀO SÒNG !!!" : "Chuẩn bị vào sòng...";
    });

    // XỬ LÝ RAID
    socket.on("raid_event", data => {
        const screen = document.getElementById("raid-screen");
        const title  = document.getElementById("raid-title");
        const msg    = document.getElementById("raid-msg");
        const img    = document.getElementById("raid-img");
        
        screen.style.display = "flex";
        siren.play();
        document.querySelectorAll(".flying-money").forEach(el => el.remove());

        if (data.type === "REAL") {
            screen.className = "raid-overlay raid-real"; 
            title.innerHTML = "🚨 HỐT SÒNG 🚨";
            msg.innerHTML = "HỦY TOÀN BỘ CƯỢC VÒNG NÀY!!!";
            img.style.display = "block"; 
            confetti({ particleCount: 500, spread: 180, origin: { y: 0.6 }, colors: ['#ff0000', '#8b0000', '#b22222'] });
        } else {
            screen.className = "raid-overlay raid-fake";
            title.innerHTML = "⚠️ BÁO ĐỘNG...";
            msg.innerHTML = "...Hàng xóm hát Karaoke thôi, bình tĩnh!";
            img.style.display = "none";
        }

        setTimeout(() => { screen.style.display = "none"; siren.pause(); siren.currentTime = 0; }, 4000);
    });

    // 3D ANIMATION
    let chaosInterval;
    const scenes = [document.getElementById('scene-1'), document.getElementById('scene-2'), document.getElementById('scene-3')];
    
    function startFlyingAndRolling() {
        document.getElementById("sfx-shake").play();
        scenes.forEach(s => { 
            s.classList.remove('show-result'); s.classList.add('flying'); s.style.opacity = '1'; 
            s.style.transform = 'translate(-50%, -50%) scale(0.8)'; 
            const cube = s.querySelector('.cube'); cube.style.transition = 'none'; cube.classList.add('is-spinning'); 
        });
        chaosInterval = setInterval(() => { 
            scenes.forEach(s => { 
                const rTop = 20 + Math.random() * 60; const rLeft = 20 + Math.random() * 60; 
                s.style.top = rTop + "%"; s.style.left = rLeft + "%"; 
            }); 
        }, 100);
    }
    
    // THÊM BIẾN is_jackpot VÀO HÀM
    function stopFlyingAndShow(result, is_jackpot = false) { 
        clearInterval(chaosInterval);
        scenes.forEach((s, i) => { 
            const cube = s.querySelector('.cube'); const animal = result[i]; const rotation = ROTATION_MAP[animal]; 
            s.classList.remove('flying'); s.classList.add('show-result'); s.style.top = '50%'; 
            if(i === 0) s.style.left = '30%'; if(i === 1) s.style.left = '50%'; if(i === 2) s.style.left = '70%'; 
            cube.classList.remove('is-spinning'); void cube.offsetWidth; 
            cube.style.transition = 'transform 1.1s cubic-bezier(.17,.67,.38,1.3)'; 
            const extraX = 360 * 4; const extraY = 360 * 4; 
            cube.style.transform = `translateZ(-110px) rotateX(${rotation.x + extraX}deg) rotateY(${rotation.y + extraY}deg)`; 
        });
        
        setTimeout(() => {
            result.forEach((animal, i) => { document.getElementById(`res-img-${i}`).src = MAP_IMG[animal]; });
            
            // --- TẠO CHỮ NỔ HŨ SIÊU TO TRÊN MÀN HÌNH ĐEN ---

                jpTitle.id = "jp-title-overlay";

                document.getElementById("result-overlay").appendChild(jpTitle);
            }
            jpTitle.innerHTML = is_jackpot ? "🔥 NỔ HŨ 🔥" : "";
            // -----------------------------------------------

            document.getElementById("result-overlay").classList.add("show");
            setTimeout(() => document.getElementById("result-overlay").classList.remove("show"), 4000);
        }, 1300);
    }
    
    function hideCubes() { 
        scenes.forEach(s => { s.style.opacity = '0'; s.style.transform = 'translate(-50%, -50%) scale(0)'; s.style.top = '-200px'; });

        stopFlyingAndShow(data.result, data.is_jackpot); 
        
        if(data.is_jackpot) { 
            setTimeout(() => {
                // Bật nhạc nổ hũ
                const jpSound = document.getElementById("sfx-jackpot");
if (jpSound && jpSound.paused) {  // ← Chỉ phát nếu đang không phát
    jpSound.currentTime = 0;
    jpSound.play().catch(e=>{});
}
                
                // Đổi chữ phía sau phòng hờ
                const label = document.getElementById("phase-label");
                label.innerHTML = "🔥 NỔ HŨ 🔥"; 
                label.style.color = "#ff1744"; 
                
                // --- TẠO MƯA TIỀN POLIME BẰNG JAVASCRIPT THUẦN ---
                const duration = 5000; // Mưa rơi trong 5 giây
                const end = Date.now() + duration;
                
                // Mảng chứa các loại tiền
                const moneyImages = ["/static/16.png", "/static/17.png"];

                const createMoney = () => {
                    if (document.hidden) return;
                    if (document.querySelectorAll('.money-rain').length > 60) return;
                    const money = document.createElement("img");
                    
                    // Lựa chọn ngẫu nhiên tờ 500k hoặc 200k
                    money.src = moneyImages[Math.floor(Math.random() * moneyImages.length)]; 
                    money.className = "money-rain";
                    
                    // Kích thước tờ tiền (tỷ lệ 2:1)
                    const width = 120 + Math.random() * 80; 
                    money.style.width = width + "px";
                    money.style.height = (width / 2) + "px";
                    
                    // Vị trí rơi ngẫu nhiên theo chiều ngang
                    money.style.left = Math.random() * 100 + "vw";
                    
                    // Tốc độ rơi ngẫu nhiên từ 2.5s đến 5s
                    money.style.animationDuration = (2.5 + Math.random() * 2.5) + "s";
                    
                    // Thêm vào trang
                    document.body.appendChild(money);
                    
                    // Tự động xóa khỏi DOM khi rơi xong để không làm nặng máy
                    setTimeout(() => {
                        money.remove();
                    }, 5000); 
                };

                // Dùng setInterval để liên tục tạo tiền rơi
                const moneyInterval = setInterval(() => {
                    if (Date.now() > end) {
                        clearInterval(moneyInterval);
                    } else {
                        // Mỗi nhịp rớt 2 tờ
                        createMoney();
                        createMoney();
                    }
                }, 100); // Tốc độ tạo (100ms/lần)
                // -------------------------

            }, 1300); 
        } 
    });
    
    let cachedPlayers = {};

    function showHostPodium(playersObj) {

        const top3 = players.slice(0, 3);
        const rest = players.slice(3);

        const displayOrder = top3.length >= 2 ? [top3[1], top3[0], top3[2]].filter(Boolean) : top3;

        const medals = top3.length >= 2 ? ['🥈','🥇','🥉'] : ['🥇','🥈','🥉'];

        displayOrder.forEach((p, i) => {
            if (!p) return;
            // Áp dụng class animation dựa trên loại huy chương của bục đó
            const animClass = rankClasses[medals[i]] || ''; 
            
            t3html += `
            <div class="podium-slot ${animClass}">
                ${isCrown[i] ? '<div class="podium-crown">👑</div>' : '<div style="height:48px"></div>'}
                <div class="podium-avatar">${p.avatar}</div>
                <div class="podium-name">${p.name}</div>
                <div class="podium-money">${p.money.toLocaleString('vi-VN')}đ</div>
                <div class="podium-block ${blockClasses[i]}">${medals[i]}</div>
            </div>`;
        });
        document.getElementById("podium-top3").innerHTML = t3html;

        let restHTML = '';
        rest.forEach((p, idx) => {
            restHTML += `
            <div class="podium-rest-item" style="animation-delay:${idx*0.07}s">
                <div class="podium-rest-left">
                    <span class="podium-rest-rank">#${idx+4}</span>
                    <span class="podium-rest-avatar">${p.avatar}</span>
                    <span class="podium-rest-name">${p.name}</span>
                </div>
                <span class="podium-rest-money">${p.money.toLocaleString('vi-VN')}đ</span>
            </div>`;
        });
        document.getElementById("podium-rest").innerHTML = restHTML || '<p style="color:rgba(255,255,255,0.3);text-align:center">— hết —</p>';
        document.getElementById("podium-screen").classList.add("show");
        // 1. Thêm âm thanh chúc mừng lúc vinh danh
        // 1. Thêm âm thanh chúc mừng lúc vinh danh (Gọi thẻ Audio đã tải sẵn)
        // 1. Thêm âm thanh chúc mừng lúc vinh danh
        const winSound = document.getElementById("sfx-win");
        // Kiểm tra và bắt buộc phát nhạc
        if (winSound) {
            winSound.currentTime = 0;
            winSound.volume = 1.0;
            winSound.play().catch(e => console.log("Lỗi kèn: ", e));
        }

        // 2. Máy bắn pháo giấy siêu to khổng lồ
        const duration = 15 * 1000;
        const animationEnd = Date.now() + duration;
        
        // CẤU HÌNH ĐỘ HOÀNH TRÁNG Ở ĐÂY:
        const defaults = { 
            startVelocity: 85,  // Lực bắn: Tăng lên 85 để pháo bay sát trần nhà (cũ là 35)
            spread: 120,        // Độ tỏa: Tăng lên 120 để pháo bung rộng ra giữa màn hình
            ticks: 300,         // Thời gian rơi: Hạt pháo sẽ bay lơ lửng lâu hơn trước khi biến mất
            zIndex: 3500,
            scalar: 1.8         // Kích thước: Phóng to hạt pháo giấy lên gần gấp đôi (mặc định là 1)
        };

        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        const interval = setInterval(function() {
            const timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            
            // Tăng số lượng hạt bắn ra mỗi nhịp lên gấp đôi (80 thay vì 40)
            const particleCount = 80 * (timeLeft / duration);
            
            // Góc x:0, y:1 (Góc trái dưới) bắn xéo lên 60 độ
            confetti(Object.assign({}, defaults, { particleCount, angle: 60, origin: { x: 0, y: 1 } }));
            // Góc x:1, y:1 (Góc phải dưới) bắn xéo lên 120 độ
            confetti(Object.assign({}, defaults, { particleCount, angle: 120, origin: { x: 1, y: 1 } }));
        }, 250); // Cứ 0.25 giây bắn một đợt
    }
    
    // --- CÁC SỰ KIỆN KHÁC (GAME OVER, ETC) ---
    socket.on("pre_game_over", () => {
        document.getElementById("game-ui").classList.add("hidden"); 
        document.getElementById("host-game-over").classList.remove("hidden");
    });
    socket.on("game_over", data => { 
        audioGame.pause();
        document.getElementById("host-game-over").classList.add("hidden");
        showHostPodium(cachedPlayers);
    });
    
    socket.on("switch_phase", data => {
        const barContainer = document.querySelector(".progress-bar-bg");
        const timerTxt = document.getElementById("timer-text");
        
        if (data.phase === "RESULT") { 
            barContainer.style.display = "none"; 
            timerTxt.style.display = "none"; 
        } else { 
            barContainer.style.display = "block"; 
            timerTxt.style.display = "block"; 
        }
        
        document.getElementById("countdown-overlay").classList.remove("show");
        document.getElementById("lobby").classList.add("hidden");
        document.getElementById("game-ui").classList.remove("hidden");
        document.body.classList.add("tet-theme");
        stopGalaxy();
        
        const quoteEl = document.getElementById("motivational-quote");
        if (data.phase === "QUIZ" || data.phase === "BETTING") { quoteEl.style.display = "block"; }
        else { quoteEl.style.display = "none"; }
        
        const label = document.getElementById("phase-label");
        if (data.label) {
            label.innerText = data.label;
            if (data.label.includes("KẾT QUẢ")) label.style.color = "#00ff00"; 
            else label.style.color = "#FFD700";
        }

        const counter = document.getElementById("question-counter");
        if (data.phase === "QUIZ" && data.round && data.total_questions) { 
            counter.style.display = "block"; 
            counter.innerText = `Câu: ${data.round}/${data.total_questions}`; 
        } else if (data.phase === "LOBBY") { 
            counter.style.display = "none"; 
        }

        if (data.phase === "QUIZ" || data.phase === "BETTING") { resetBetSlots(); hideCubes(); }

        const bar = document.getElementById("progress-bar");
        if (window.currentTimer) {
            cancelAnimationFrame(window.currentTimer);
            delete window.currentTimer;
        }
        const maxDuration = data.duration || DURATION_MAP[data.phase] || 15; 
        if (data.end_time) {
            const updateTimer = () => {
                const nowSynced = (Date.now() / 1000) + timeOffset;
                const remaining = data.end_time - nowSynced;
                
                if (remaining <= 0) { 
                    bar.style.width = "0%"; 
                    timerTxt.innerText = "0s"; 
                    cancelAnimationFrame(window.currentTimer);
                    delete window.currentTimer;
                    return; 
                } else { 
                    timerTxt.innerText = Math.ceil(remaining) + "s"; 
                    let percent = (remaining / maxDuration) * 100; 
                    if (percent > 100) percent = 100; 
                    bar.style.width = percent + "%"; 
                    window.currentTimer = requestAnimationFrame(updateTimer);
                }
            };
            window.currentTimer = requestAnimationFrame(updateTimer);
        } else { 
            bar.style.width = "0%"; 
            timerTxt.innerText = ""; 
        }
    });

    socket.on("force_reload", () => window.location.reload());

    socket.on("show_quote", data => {
        const quoteEl = document.getElementById("motivational-quote");
        const len = data.text.length;
        const fs = len > 100 ? "28px" : len > 60 ? "34px" : len > 40 ? "40px" : "48px";
        quoteEl.innerHTML = `<div style="font-size:${fs}; line-height:1.5">💬 ${data.text}</div>`;
        quoteEl.style.display = "block";
    });
    
    socket.on("update_list", data => {
        cachedPlayers = data;
        
        const players = Object.entries(data).map(([id, p]) => ({ id, ...p }));
        document.getElementById("count").innerText = players.length;
        
        const lList = document.getElementById("lobby-list"); 
 lList.innerHTML = ""; // Xóa nội dung cũ một lần
        
        // Tạo Fragment để chứa các node tạm thời
        const fragment = document.createDocumentFragment();

 players.forEach(p => {
            // Tạo div và gán class, nội dung
            const div = document.createElement("div");
            div.className = "lobby-card";
            div.innerHTML = `${p.avatar} ${p.name}`;
            // Thêm vào fragment thay vì list thật
            fragment.appendChild(div);
 });

        // Append toàn bộ fragment vào DOM một lần duy nhất
        lList.appendChild(fragment);
        
        const rList = document.getElementById("rank-list"); 
        const ITEM_HEIGHT = 58; 
        rList.style.height = (players.length * ITEM_HEIGHT) + "px"; 
        
        players.sort((a, b) => b.money - a.money).forEach((p, index) => {
        const domId = "rank-player-" + p.id;
        let el = document.getElementById(domId);

        let cls = "rank-item";
        if (index === 0) cls += " top-1";
        else if (index === 1) cls += " top-2";
        else if (index === 2) cls += " top-3";

        // Tạo thẻ mới nếu chưa có (Bỏ luôn thư viện CountUp)
        if (!el) {
            el = document.createElement("div");
            el.id = domId;
            el.innerHTML = `<span class="player-info"></span><span id="money-${p.id}" class="money-text" style="font-weight: 900;">0</span>`;
            rList.appendChild(el);
        }

        el.className = cls;
        el.querySelector('.player-info').innerHTML = `${index + 1}. ${p.avatar} ${p.name}`;

        // ĐÓNG THẲNG TIỀN MỚI VÀO (Giải quyết 100% lỗi không cập nhật khi ăn cược)
        const moneySpan = document.getElementById(`money-${p.id}`);
        if (moneySpan) {
            // Lưu lại tiền cũ để so sánh
            const oldMoney = parseInt(moneySpan.innerText.replace(/\./g, '').replace(/,/g, '')) || 0;
            
            // Cập nhật tiền mới
            moneySpan.innerText = p.money.toLocaleString('vi-VN');

            // NẾU TIỀN THAY ĐỔI -> Cho con số phóng to lên rồi thu lại + Đổi màu vàng chớp nhoáng
            if (p.money !== oldMoney) {
                moneySpan.style.transition = "none";
                moneySpan.style.color = "#00ff00"; // Chớp màu xanh lá
                moneySpan.style.transform = "scale(1.5)";
                
                setTimeout(() => {
                    moneySpan.style.transition = "all 0.5s ease";
                    moneySpan.style.color = ""; // Trả về màu cũ
                    moneySpan.style.transform = "scale(1)";
                }, 50);
            }
        }

        // Vẫn giữ lại chuyển động trượt lên/xuống mượt mà
        el.style.transform = `translateY(${index * ITEM_HEIGHT}px)`;
        el.style.zIndex = players.length - index;
    });
        
        // Xóa người chơi đã thoát
        Array.from(rList.children).forEach(child => {
            const playerId = child.id.replace("rank-player-", "");
            if (!data[playerId]) {
                child.remove();
            }
        });
    });
    
    let lastCoinSound = 0;
    socket.on("host_update_bets_batched", batchedData => {
    let hasBet = false;
    for (const [animal, amount] of Object.entries(batchedData)) {
        if (amount > 0) {
            hasBet = true;
            const totalEl = document.getElementById(`total-${animal}`);
            if(!totalEl) continue;
            let current = parseInt(totalEl.innerText.replace(/\./g, '').replace(/,/g, '')) || 0;
            totalEl.innerText = (current + amount).toLocaleString('vi-VN');
            const slot = document.getElementById(`slot-${animal}`);
            if (slot) {
                const fly = document.createElement("div");
                fly.className = "flying-money";
                fly.innerText = `+${(amount/1000)}k`; 
                fly.style.left = (20+Math.random()*60)+"%"; 
                fly.style.top = "50%";
                slot.appendChild(fly);
                setTimeout(()=>fly.remove(), 1000);
            }
        }
    }
    if (hasBet) {
        const coinSfx = document.getElementById("sfx-coin");
        if (coinSfx) {
            let cloneSound = coinSfx.cloneNode();
            cloneSound.volume = 0.5;
            cloneSound.play().catch(e=>{});
        }
    }
});

    let scene, camera, renderer, galaxy;

    function initGalaxy() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({canvas: document.getElementById('galaxy-canvas'), alpha: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const geometry = new THREE.BufferGeometry(); 
        const count = 4000;
        const positions = new Float32Array(count * 3); 
        const colors = new Float32Array(count * 3);
        
        for(let i=0; i<count; i++) {
            const angle = Math.random() * Math.PI * 2; 
            const radius = 3 + Math.random() * 6; 
            const x = Math.cos(angle) * radius; 
            const z = Math.sin(angle) * radius; 
            const y = (Math.random() - 0.5) * 0.5;
            
            positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
            
            const mix = (radius - 3) / 6; 
            colors[i*3] = 1.0 - (mix * 0.5); 
            colors[i*3+1] = 0.6 - (mix * 0.6); 
            colors[i*3+2] = mix * 1.0;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const material = new THREE.PointsMaterial({size: 0.03, vertexColors: true, blending: THREE.AdditiveBlending});
        galaxy = new THREE.Points(geometry, material); 
        scene.add(galaxy);
        
        camera.position.set(0, 5, 8); 
        camera.lookAt(0, 0, 0);
        
        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });

        // Bắt đầu render
        startGalaxy();
    }

    // Tách riêng hàm animate để dễ quản lý
    function animateGalaxy() { 
        if (!isGalaxyActive) return; 
        
        galaxyAnimationId = requestAnimationFrame(animateGalaxy); 
        galaxy.rotation.y += 0.001; 
        renderer.render(scene, camera); 
    }

    function stopGalaxy() {
        isGalaxyActive = false;
        if (galaxyAnimationId) {
            cancelAnimationFrame(galaxyAnimationId);
            galaxyAnimationId = null;
        }
    }

    function startGalaxy() {
        if (!isGalaxyActive || !galaxyAnimationId) {
            isGalaxyActive = true;
            animateGalaxy();
        }
    }
    initGalaxy();

    function resizeGame() {
        const wrapper = document.getElementById('game-wrapper');
        const scaleX = window.innerWidth / 1920;
        const scaleY = window.innerHeight / 1080;
        const scale = Math.min(scaleX, scaleY); 
        
        const offsetX = (window.innerWidth - 1920 * scale) / 2;
        const offsetY = (window.innerHeight - 1080 * scale) / 2;
        
        wrapper.style.transform = `scale(${scale})`;
        wrapper.style.left = offsetX + 'px';
        wrapper.style.top = offsetY + 'px';
    }
    window.addEventListener('resize', resizeGame);
    resizeGame();
    // =============================================
    // PHÍM TẮT FULLSCREEN (Bấm phím F)
    // =============================================
    document.addEventListener('keydown', function(event) {
        // Bỏ qua lệnh nếu vô tình đang gõ phím trong một ô input nào đó
        if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;

        // Nếu phím bấm là 'f' hoặc 'F'
        if (event.key.toLowerCase() === 'f') {
            if (!document.fullscreenElement) {
                // Nếu chưa Fullscreen -> Bật Fullscreen cho toàn bộ trang web
                document.documentElement.requestFullscreen().catch((err) => {
                    console.log(`Không thể bật toàn màn hình: ${err.message}`);
                });
            } else {
                // Nếu đang Fullscreen -> Tắt Fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    });
document.addEventListener('keydown', function(event) {
    if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
    if (event.shiftKey && event.key.toLowerCase() === 'r') {
        if(confirm("⚠️ CẢNH BÁO QUAN TRỌNG ⚠️\nBạn có chắc chắn muốn HỦY SÒNG NGAY LẬP TỨC?\n\n(Toàn bộ tiền cược và tiến trình sẽ bị xóa sạch, mọi người chơi sẽ bị văng về lại màn hình đăng nhập ban đầu)")) {
            socket.emit("stop_game");
        }
    }
});
// Hàm điều khiển phóng to / thu nhỏ mã QR
function toggleQR() {
    const qrWrapper = document.getElementById('qr-wrapper');
    const qrOverlay = document.getElementById('qr-overlay');
    
    qrWrapper.classList.toggle('zoomed');
    qrOverlay.classList.toggle('show');
}
